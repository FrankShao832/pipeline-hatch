# DCC Configuration
# Digital Content Creation software settings

dcc:
  maya:
    name: "Maya"
    role: "maya"
    app_name: "Maya.app"
    executable: "/Applications/Autodesk/maya2026/Maya.app/Contents/MacOS/Maya"
    env_file: "~/Library/Preferences/Autodesk/maya/2026/Maya.env"
    flags:
      file: "-file"
      project: "-proj"

  houdini:
    name: "Houdini"
    role: "houdini"
    app_name: "Houdini FX 20.5.613.app"
    executable: "/Applications/Houdini/Houdini20.5.613/Houdini FX 20.5.613.app/Contents/MacOS/houdinifx"
    env_vars:
      JOB: ""  # Set dynamically at runtime
    flags:
      file: ""

  nuke:
    name: "Nuke"
    role: "nuke"
    app_name: "Nuke16.0v3.app"
    executable: "/Applications/Nuke16.0v3/Nuke16.0v3.app/Contents/MacOS/Nuke16.0"
    flags:
      nukex: "--nukex"
      file: ""
      project: "-m"

# Pipeline environment variables
# Legacy names (SHOW/SEQ/SHOT/ROLE) kept for backward compatibility
# PIPELINE_* names are the publisher's primary source (see publisher.core.constants)
pipeline:
  env_vars:
    - ROLE
    - PROJECT_ROOT
    - PUBLISH_ROOT
    - SHOW
    - SEQ
    - SHOT
    - PIPELINE_PROJECT
    - PIPELINE_SEQUENCE
    - PIPELINE_SHOT
    - PIPELINE_DEPARTMENT
    - PIPELINE_USER
    - PIPELINE_DCC