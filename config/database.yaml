# Database Configuration
# PostgreSQL connection settings for Pipeline Launcher
#
# Priority: environment variable > YAML file > hardcoded defaults
# Environment variable overrides:
#   DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD

database:
  host: "localhost"
  port: 5432
  name: "pipeline_db"
  user: "frank"      # Replace with your DB username
  password: ""                    # Override via DB_PASSWORD env var
  pool_size: 5
  max_overflow: 10
  echo: false
